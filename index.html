<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papagaio Saltador</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="title">
      <h1>Papagaio Saltador</h1>
      <p>Use ← → para andar e Espaço para pular. Chegue ao lobo boss!</p>
    </div>
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div class="hud">
      <span id="score">Pontos: 0</span>
      <span id="message">Pressione Espaço para começar</span>
      <span id="httpStatus">Código HTTP: 200 (página disponível)</span>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
